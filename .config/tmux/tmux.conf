# Tmux configuration

# Use default shell
set-option -g default-shell "$SHELL"

# Terminal settings
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm*:Tc"
set -g mouse on
set -g history-limit 100000
set -sg escape-time 10
set-option -g focus-events on

# Start windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Prefix key (backtick)
unbind C-b
set-option -g prefix `
set-option -g repeat-time 0
bind -r '`' send-keys '`'

# Vi mode
set-window-option -g mode-keys vi

# Copy mode (per-OS clipboard wired up in macos.conf / linux.conf)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Key bindings
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind o run-shell "open #{pane_current_path}"
bind -r e kill-pane -a
bind -r | split-window -h -c "#{pane_current_path}"
bind -r - split-window -v -c "#{pane_current_path}"

# Moving windows
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; next-window

# Resizing panes
bind -r C-k resize-pane -U 5
bind -r C-j resize-pane -D 5
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5

# Status bar
set-option -g status-justify "left"

# Popup terminal - pass through C-h/j/k/l so vim-tmux-navigator doesn't intercept
bind C-f display-popup -E -w 80% -h 80% -d "#{pane_current_path}"
bind -T popup C-h send-keys C-h
bind -T popup C-j send-keys C-j
bind -T popup C-k send-keys C-k
bind -T popup C-l send-keys C-l
bind -T popup C-\\ send-keys C-\\

# Tmux sessionizer
bind f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Agent window - spin up a new claude code window
bind C-a command-prompt -p "agent name:" "new-window -n '%%' 'claude'"

# Clipboard (OSC 52 for remote/nested)
set -g set-clipboard on

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @catppuccin_flavour 'mocha'
set -g @plugin 'fcsonline/tmux-thumbs'

# Per-OS overrides
if-shell "uname -s | grep -q Darwin" "source ~/.config/tmux/macos.conf"
if-shell "uname -s | grep -q Linux"  "source ~/.config/tmux/linux.conf"

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
