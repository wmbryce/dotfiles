# Linux specific settings

# Undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Clipboard — prefer wl-copy (wayland), fall back to xclip, then xsel
if-shell 'command -v wl-copy' \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'; \
   bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'" \
  "if-shell 'command -v xclip' \
    \"bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -i'; \
     bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -i'\" \
    \"bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xsel -i --clipboard'; \
     bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xsel -i --clipboard'\""

# `bind o` opens current path — use xdg-open instead of mac's open
bind o run-shell "xdg-open #{pane_current_path}"
